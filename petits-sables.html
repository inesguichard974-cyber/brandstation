<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Studio Étiquettes 50x40 - Mise à jour Live</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <style>
        :root {
            --beige-bande: #f2ede2;
            --lbl-w: 50mm;
            --lbl-h: 40mm;
        }

        @page { size: A4; margin: 10mm; }

        body {
            margin: 0; font-family: 'Arial', sans-serif;
            display: flex; height: 100vh; background: #dcdcdc;
            overflow: hidden;
        }

        /* --- SIDEBAR --- */
        .sidebar {
            width: 350px; background: white; padding: 20px;
            box-shadow: 2px 0 15px rgba(0,0,0,0.2);
            overflow-y: auto; display: flex; flex-direction: column; gap: 12px;
            z-index: 100;
        }
        .sidebar h2 { font-size: 1.1rem; border-bottom: 2px solid #27ae60; padding-bottom: 5px; margin: 0; }
        .input-group { display: flex; flex-direction: column; gap: 3px; }
        .input-group label { font-size: 0.75rem; font-weight: bold; color: #555; }
        .input-group select, .input-group input { padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-size: 0.9rem; }

        .btn-action {
            border: none; padding: 12px; border-radius: 6px; 
            font-weight: bold; cursor: pointer; margin-top: 5px; color: white;
        }
        .btn-print { background: #27ae60; }
        .btn-download { background: #2980b9; }

        .warning-box {
            background: #e7f3ff; color: #0c5460; padding: 10px; font-size: 0.75rem;
            border-radius: 4px; border: 1px solid #bee5eb;
        }

        /* --- ZONE PREVIEW --- */
        .preview-pane {
            flex-grow: 1; display: flex; justify-content: center; align-items: center;
            overflow: auto; padding: 20px;
        }

        #label-wrap { transition: transform 0.1s ease; }

        /* --- L'ÉTIQUETTE --- */
        .label-container {
            width: var(--lbl-w);
            height: var(--lbl-h);
            background-color: white;
            background-image: url("FOND THE BLANC...-0001.jpg");
            background-size: cover;
            background-position: center;
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: space-between; /* Assure que le header et footer restent aux extrémités */
            box-sizing: border-box;
            overflow: hidden;
            -webkit-print-color-adjust: exact;
            print-color-adjust: exact;
        }

        .logo-main {
            width: 13.5mm; margin: 1.2mm auto 0.3mm auto; display: block;
            filter: brightness(0.7) contrast(1.4);
            flex-shrink: 0; /* Empêche le logo de rétrécir */
        }

        .title-band {
            background-color: var(--beige-bande) !important;
            width: 100%; padding: 1.3mm 0; text-align: center;
            border-top: 0.1mm solid rgba(0,0,0,0.1); border-bottom: 0.1mm solid rgba(0,0,0,0.1);
            flex-shrink: 0;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        /* FIX WINDOWS : nowrap et léger ajustement de la police */
        .product-title { 
            color: #000 !important; 
            font-size: 8pt; /* Réduit très légèrement pour Windows */
            letter-spacing: -0.2px; /* Resserre très légèrement les lettres */
            font-weight: 900; 
            margin: 0; 
            text-transform: uppercase; 
            white-space: nowrap; /* Interdit le passage à la ligne */
        }

        .ingredients {
            flex-grow: 1; padding: 0.5mm 3.5mm; text-align: center;
            font-size: 5.4pt; line-height: 1.2; color: #1a1a1a;
            display: flex; align-items: center; justify-content: center;
            overflow: hidden; /* Empêche de déborder sur le footer */
        }

        /* FIX WINDOWS : flex-shrink 0 empêche le bloc d'être écrasé par les ingrédients */
        .footer-area { 
            padding: 0 2.2mm 1.5mm 2.2mm; 
            flex-shrink: 0; 
        }
        
        .baf-row { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 0.8mm; }
        .logo-baf { height: 6.5mm; }
        
        .certif-block { 
            text-align: right; 
            font-size: 3.8pt; 
            line-height: 1.3;
            color: #222; 
        }

        .tracking-bar {
            border-top: 0.2mm solid #000; padding-top: 0.8mm;
            display: flex; justify-content: space-between;
            font-size: 5.2pt; font-weight: bold; color: #000;
        }

        /* --- PRINT GRID --- */
        #print-grid { display: none; width: 190mm; margin: 0 auto; }

        @media print {
            body * { visibility: hidden; }
            #print-grid, #print-grid * { visibility: visible; }
            #print-grid {
                display: flex !important; flex-wrap: wrap; gap: 0;
                position: absolute; left: 10mm; top: 10mm;
            }
            .label-container { box-shadow: none; border: 0.1mm solid #f2f2f2; page-break-inside: avoid; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>Sablé 30g - Studio</h2>
        <div class="input-group">
            <label>Parfum</label>
            <select id="inFlavor" onchange="loadFlavor()">
                <option value="the">Sablé au Thé Blanc</option>
                <option value="gingembre">Sablé au Gingembre</option>
                <option value="vanille">Sablé Thé Blanc & Vanille</option>
                <option value="geranium">Sablé Géranium Rosat</option>
                <option value="cannelle">Sablé Cannelle</option>
                <option value="curcuma">Sablé Thé Vert & Curcuma</option>
                <option value="mangue">Sablé Gingembre Mangue</option>
            </select>
        </div>
        <div class="input-row" style="display:flex; gap:10px;">
            <div class="input-group">
                <label>Lot</label>
                <input type="text" id="inLot" value="212852" oninput="syncTracking()">
            </div>
            <div class="input-group">
                <label>DDM</label>
                <input type="text" id="inDDM" value="02/2027" oninput="syncTracking()">
            </div>
        </div>
        <div class="input-group">
            <label>Zoom Vue écran</label>
            <input type="range" id="inZoom" min="1" max="6" step="0.1" value="3.5" oninput="applyZoom()">
        </div>
        <div class="input-group">
            <label>Nombre d'étiquettes</label>
            <input type="number" id="inCount" value="1" min="1">
        </div>
        
        <button class="btn-action btn-download" onclick="downloadPDF()">TÉLÉCHARGER LE PDF</button>
        <button class="btn-action btn-print" onclick="printLabels()">IMPRIMER DIRECTEMENT</button>
    </div>

    <div class="preview-pane">
        <div id="label-wrap">
            <div class="label-container" id="main-label">
                <img src="logo-noir.png" class="logo-main" alt="Logo">
                <div class="title-band">
                    <div class="product-title" id="outTitle">Sablé au Thé Blanc</div>
                </div>
                <div class="ingredients" id="outIng"></div>
                <div class="footer-area">
                    <div class="baf-row">
                        <img src="BAF.png" class="logo-baf" alt="Logo BAF">
                        <div class="certif-block">
                            *Issu de l'agriculture biologique<br>
                            Certifié par FR-BIO-01<br>
                            Réunion, Grand Coude
                        </div>
                    </div>
                    <div class="tracking-bar">
                        <span>LOT : <span id="outLot"></span></span>
                        <span>DDM : <span id="outDDM"></span></span>
                        <span>30 g</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="print-grid"></div>

    <script>
        const flavors = {
            the: { t: "Sablé au Thé Blanc", i: "Ingrédients : Farine (55,1%), beurre (36,73%), sucre (6,12%), thé blanc* (2,04%)." },
            gingembre: { t: "Sablé au Gingembre", i: "Ingrédients : Farine (55,42%), beurre (36,95%), sucre (6,16%), gingembre* (1,48%)." },
            vanille: { t: "Sablé Thé Blanc & Vanille", i: "Ingrédients : Farine (54,9%), beurre (36,6%), sucre (6,1%), thé blanc*(2,03%), vanille* (0,38%)." },
            geranium: { t: "Sablé Géranium Rosat", i: "Ingrédients : Farine (56,24%), beurre (37,49%), sucre (6,25%), huile essentielle de géranium rosat * (0,02%)." },
            cannelle: { t: "Sablé Cannelle", i: "Ingrédients : Farine (55,42%), beurre (36,95%), sucre (6,16%), cannelle * (1,48%)." },
            curcuma: { t: "Sablé Thé Vert & Curcuma", i: "Ingrédients : Farine (55,9%), beurre (37,26%), sucre (6,21%), thé vert* (2,07%), curcuma * (0,62%)." },
            mangue: { t: "Sablé Gingembre Mangue", i: "Ingrédients : Farine (55,42%), beurre (36,95%), sucre (6,16%), gingembre mangue (1,48%)." }
        };

        function syncTracking() {
            document.getElementById('outLot').innerText = document.getElementById('inLot').value;
            document.getElementById('outDDM').innerText = document.getElementById('inDDM').value;
        }

        function loadFlavor() {
            const f = flavors[document.getElementById('inFlavor').value];
            document.getElementById('outTitle').innerText = f.t;
            document.getElementById('outIng').innerText = f.i;
            syncTracking();
        }

        function applyZoom() {
            document.getElementById('label-wrap').style.transform = `scale(${document.getElementById('inZoom').value})`;
        }

        function prepareGrid() {
            syncTracking();
            const count = document.getElementById('inCount').value;
            const grid = document.getElementById('print-grid');
            grid.innerHTML = '';
            const html = document.getElementById('main-label').outerHTML;
            for(let i=0; i<count; i++) grid.innerHTML += html;
            return grid;
        }

        function printLabels() {
            prepareGrid();
            setTimeout(() => { window.print(); }, 300);
        }

        function downloadPDF() {
            const element = prepareGrid();
            element.style.display = 'flex';
            
            const opt = {
                margin:       10,
                filename:     'etiquettes_sables_30g.pdf',
                image:        { type: 'jpeg', quality: 0.98 },
                html2canvas:  { scale: 3, useCORS: true },
                jsPDF:        { unit: 'mm', format: 'a4', orientation: 'portrait' }
            };

            html2pdf().set(opt).from(element).save().then(() => {
                element.style.display = 'none';
            });
        }

        window.onload = () => { loadFlavor(); applyZoom(); };
    </script>
</body>
</html>
