<!DOCTYPE html>
<html lang="fr">
<head>
    <link rel="icon" type="image/png" href="images/favicon.png">

<link rel="apple-touch-icon" href="images/favicon.png">
    <meta charset="UTF-8">
    <title>Studio Labyrinthe - Étiquette</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        :root {
            --label-w: 10cm; --label-h: 10cm;
            --color-fond: #ffffff;
            --color-accent: #f2e8cf; 
            --color-txt-cat: #000000;
            --color-txt-flav: #000000;
            --motif-opacity: 0.4;
            --flavor-size: 38px;
            --dist-logo-bande: 30px;
            --band-padding: 24px;
            --tab-width: 200px;
            --logo-width: 110px; /* Nouvelle variable pour la taille du logo */
        }

        body { font-family: 'Helvetica Neue', Arial, sans-serif; display: flex; margin: 0; background: #111; color: #eee; height: 100vh; overflow: hidden; }
        
        .sidebar { width: 400px; padding: 25px; background: #1a1a1a; border-right: 1px solid #333; overflow-y: auto; }
        .sidebar h2 { color: #2ecc71; font-size: 18px; margin-bottom: 25px; }
        .section { margin-bottom: 20px; padding: 15px; background: #222; border-radius: 8px; border: 1px solid #333; }
        label { display: block; font-size: 10px; color: #888; margin-bottom: 8px; text-transform: uppercase; font-weight: bold; }
        
        input[type="range"], input[type="text"], input[type="number"], select { 
            width: 100%; padding: 10px; background: #2d2d2d; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; margin-bottom: 10px;
        }

        .row { display: flex; gap: 10px; }
        input[type="color"] { width: 100%; height: 45px; border: none; border-radius: 4px; cursor: pointer; background: none; }

        .btn-group { display: flex; gap: 10px; margin-top: 10px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 14px; }
        .btn-export { background: #3498db; color: white; }
        .btn-print { background: #27ae60; color: white; }

        .preview { flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #0f0f0f; }

        #etiquette {
            width: var(--label-w); height: var(--label-h);
            background-color: var(--color-fond);
            position: relative; display: flex; flex-direction: column; align-items: center;
            overflow: hidden;
        }

        .background-pattern {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-image: url('images/fond-motif.png');
            background-size: cover; 
            opacity: var(--motif-opacity);
            z-index: 1;
            pointer-events: none;
        }

        .logo-tab {
            position: relative; z-index: 10;
            background-color: var(--color-accent);
            width: var(--tab-width); height: 195px;
            border-radius: 0 0 100px 100px;
            display: flex; align-items: center; justify-content: center;
        }

        .logo-tab::after {
            content: "";
            position: absolute;
            top: 0; left: 4px; right: 4px; bottom: 4px;
            border: 1px solid #000000;
            border-top: none;
            border-radius: 0 0 96px 96px;
            pointer-events: none;
        }

        /* Utilisation de la variable pour la taille du logo  */
        .logo-tab img { 
            width: var(--logo-width); 
            height: auto; 
            margin-top: -10px; 
            z-index: 11; 
        }

        .category-band {
            position: relative; z-index: 5;
            background-color: var(--color-accent);
            width: 100%; margin-top: var(--dist-logo-bande);
            padding: var(--band-padding) 0;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .category-text { color: var(--color-txt-cat); font-size: 42px; font-weight: 500; letter-spacing: 5px; margin: 0; text-transform: uppercase; }

        .flavor-container {
            position: relative; z-index: 5; flex-grow: 1;
            display: flex; align-items: center; justify-content: center;
            width: 100%; padding: 0 20px; box-sizing: border-box;
        }
        .flavor-text {
            color: var(--color-txt-flav); font-size: var(--flavor-size);
            font-weight: 400; letter-spacing: 3px; text-transform: uppercase;
            white-space: nowrap;
        }
    </style>
</head>
<body>

<div class="sidebar">
    <h2>LABYRINTHE DESIGNER</h2>

    <div class="section">
        <label>Dimensions Étiquette (cm)</label>
        <div class="row">
            <input type="number" id="w" value="10" oninput="update()">
            <input type="number" id="h" value="10" oninput="update()">
        </div>
    </div>

    <div class="section">
        <label>Couleurs Structure</label>
        <div class="row">
            <div style="flex:1"><label>Fond Global</label><input type="color" id="bg-in" value="#ffffff" oninput="update()"></div>
            <div style="flex:1"><label>Bande/Onglet</label><input type="color" id="accent-in" value="#f2e8cf" oninput="update()"></div>
        </div>
    </div>

    <div class="section">
        <label>Couleurs Texte</label>
        <div class="row">
            <div style="flex:1">
                <label>Catégorie</label>
                <select id="txt-cat-color" onchange="update()">
                    <option value="#000000">Noir</option>
                    <option value="#ffffff">Blanc</option>
                </select>
            </div>
            <div style="flex:1">
                <label>Saveur</label>
                <select id="txt-flav-color" onchange="update()">
                    <option value="#000000">Noir</option>
                    <option value="#ffffff" selected>Blanc</option>
                </select>
            </div>
        </div>
    </div>

    <div class="section">
        <label>Ajustements</label>
        <label>Taille du Logo</label>
        <input type="range" id="logo-size-in" min="50" max="180" value="110" oninput="update()">
        
        <label style="margin-top:10px;">Hauteur de la Bande</label>
        <input type="range" id="band-h-in" min="5" max="60" value="24" oninput="update()">
        
        <label style="margin-top:10px;">Distance Logo <-> Bande</label>
        <input type="range" id="dist-in" min="0" max="150" value="30" oninput="update()">
        
        <label style="margin-top:10px;">Visibilité Feuilles</label>
        <input type="range" id="op-in" min="0" max="1" step="0.05" value="0.4" oninput="update()">
    </div>

    <div class="section">
        <label>Contenu</label>
        <input type="text" id="cat-in" value="THÉ BLANC" oninput="update()">
        <input type="text" id="flav-in" value="GÉRANIUM ROSAT" oninput="update()">
        <label>Taille Police Saveur</label>
        <input type="range" id="size-in" min="20" max="85" value="38" oninput="update()">
    </div>

    <div class="btn-group">
        <button class="btn-export" onclick="exportPNG()">EXPORT PNG</button>
        <button class="btn-print" onclick="window.print()">IMPRIMER</button>
    </div>
</div>

<div class="preview">
    <div id="etiquette">
        <div class="background-pattern"></div>
        <div class="logo-tab">
            <img src="images/logo-labyrinthe.png" alt="LOGO">
        </div>
        <div class="category-band">
            <h1 class="category-text" id="cat-out">THÉ BLANC</h1>
        </div>
        <div class="flavor-container">
            <div class="flavor-text" id="flav-out">GÉRANIUM ROSAT</div>
        </div>
    </div>
</div>

<script>
    function update() {
        const root = document.documentElement;
        
        // Couleurs
        root.style.setProperty('--color-fond', document.getElementById('bg-in').value);
        root.style.setProperty('--color-accent', document.getElementById('accent-in').value);
        root.style.setProperty('--color-txt-cat', document.getElementById('txt-cat-color').value);
        root.style.setProperty('--color-txt-flav', document.getElementById('txt-flav-color').value);
        
        // Dimensions & Ajustements
        root.style.setProperty('--label-w', document.getElementById('w').value + 'cm');
        root.style.setProperty('--label-h', document.getElementById('h').value + 'cm');
        root.style.setProperty('--logo-width', document.getElementById('logo-size-in').value + 'px');
        root.style.setProperty('--band-padding', document.getElementById('band-h-in').value + 'px');
        root.style.setProperty('--dist-logo-bande', document.getElementById('dist-in').value + 'px');
        root.style.setProperty('--motif-opacity', document.getElementById('op-in').value);
        root.style.setProperty('--flavor-size', document.getElementById('size-in').value + 'px');
        
        // Textes
        document.getElementById('cat-out').innerText = document.getElementById('cat-in').value;
        document.getElementById('flav-out').innerText = document.getElementById('flav-in').value;
    }

    function exportPNG() {
        const element = document.getElementById('etiquette');
        html2canvas(element, { 
            scale: 4, 
            backgroundColor: null,
            useCORS: true
        }).then(canvas => {
            const link = document.createElement('a');
            link.download = document.getElementById('flav-in').value + '.png';
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
        });
    }
</script>

</body>
</html>
